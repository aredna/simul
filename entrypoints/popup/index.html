<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Simul</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">Local translation companion</p>
      <h1>Simul</h1>
      <p class="intro">
        Compare this page with a read-only Japanese or English translation.
      </p>

      <button id="open-panel" class="primary" type="button">
        Open translation panel
      </button>
      <p id="status" class="status" role="status" aria-live="polite">
        Text translation runs on-device.
      </p>

      <p class="fine-print">
        Works on regular HTTP and HTTPS pages in Chrome 138 or newer. Panel
        placement follows Chrome's global setting.
      </p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

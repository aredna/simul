<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Translation companion</title>
    <script type="module" crossorigin src="/chunks/sidepanel-Cg4_OaVD.js"></script>
    <link rel="modulepreload" crossorigin href="/chunks/browser-B79nNR8W.js">
    <link rel="stylesheet" crossorigin href="/assets/sidepanel-DIe0yItm.css">
  </head>
  <body>
    <nav id="compact-toolbar" class="compact-toolbar" aria-label="Translation companion controls">
      <button id="toggle-settings" class="toolbar-button" type="button" aria-label="Open translation options" aria-expanded="false" title="Translation options">
        ⚙
      </button>
      <span id="status-dot" class="status-dot" title="Reading the source page"></span>
      <button id="open-popout" class="toolbar-button" type="button" aria-label="Open detached companion window" title="Open detached window">
        ↗
      </button>
    </nav>

    <section id="control-overlay" class="control-overlay" hidden aria-label="Translation options">
      <div class="overlay-heading">
        <strong>Options</strong>
        <button id="close-settings" class="quiet-button" type="button" aria-label="Close options">×</button>
      </div>

      <div class="language-row">
        <label>
          <span>From</span>
          <select id="source-language"></select>
        </label>
        <button id="swap-languages" class="icon-button" type="button" aria-label="Swap languages" title="Swap languages">⇄</button>
        <label>
          <span>To</span>
          <select id="target-language"></select>
        </label>
      </div>
      <p id="detected-language" class="microcopy"></p>

      <div class="settings-grid">
        <label>
          <span>Automatic translation</span>
          <select id="auto-translate-mode">
            <option value="off">Off</option>
            <option value="site">This site</option>
            <option value="all">All sites</option>
          </select>
        </label>
        <label>
          <span>Size</span>
          <select id="mirror-display-mode">
            <option value="fit">Fit width</option>
            <option value="actual">1:1 size</option>
            <option value="custom">Custom zoom</option>
          </select>
        </label>
        <label>
          <span>Translated text</span>
          <select id="text-layout-mode">
            <option value="adaptive">Let boxes grow</option>
            <option value="faithful">Keep geometry</option>
          </select>
        </label>
        <label class="check-label">
          <input id="sync-scroll" type="checkbox">
          <span>Follow source scrolling</span>
        </label>
      </div>

      <div class="zoom-row" aria-label="Mirror zoom">
        <button id="zoom-out" type="button" aria-label="Zoom out">−</button>
        <input id="zoom" type="range" min="25" max="300" step="5" value="100">
        <output id="zoom-value" for="zoom">100%</output>
        <button id="zoom-in" type="button" aria-label="Zoom in">+</button>
      </div>

      <div class="action-row">
        <button id="translate" class="primary" type="button" disabled>Translate page</button>
        <button id="refresh" type="button">Rebuild mirror</button>
        <button id="cancel" class="danger" type="button" hidden>Cancel</button>
      </div>

      <details class="composer">
        <summary>Write a reply in the website language</summary>
        <label for="composer-input">Text to translate back</label>
        <textarea id="composer-input" rows="3" maxlength="5000" placeholder="Type here…"></textarea>
        <div class="composer-actions">
          <button id="translate-composer" type="button">Translate reply</button>
          <button id="copy-composer" type="button" disabled>Copy result</button>
        </div>
        <textarea id="composer-output" rows="3" readonly aria-label="Translated reply"></textarea>
      </details>

      <div id="progress-region" class="progress-region" hidden>
        <label id="progress-label" for="progress">Preparing translation…</label>
        <progress id="progress" max="1" value="0"></progress>
      </div>
      <p id="status" class="status" role="status" aria-live="polite">Reading the source page…</p>
      <p id="capture-notes" class="microcopy" hidden></p>
      <p id="placement-guidance" class="microcopy" hidden>
        Chrome places native side panels globally. Use the ↗ button for a detached companion window.
      </p>
    </section>

    <main>
      <p id="replica-mode-badge" class="replica-mode-badge" role="status" aria-live="polite" hidden></p>
      <section id="snapshot" class="snapshot" aria-label="Translated page mirror">
        <div class="empty-state"><p>Preparing the live read-only mirror…</p></div>
      </section>
      <section id="replica-preview" class="replica-preview" aria-label="Static untranslated page preview" aria-hidden="true" hidden></section>
    </main>

  </body>
</html>
